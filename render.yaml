services:
  - type: web
    name: bible-hall
    runtime: node
    plan: free
    buildCommand: "npm install --omit=dev"
    startCommand: "npm start"
    healthCheckPath: "/api/health"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_TZ
        value: Asia/Seoul
